    <!-- desktop top bar -->
    <header class="topbar">
      <div class="inner">
        <a class="logo" href="@@langBase/" aria-label="@@t.brand.home">
          <span class="text">Shodumo</span><span class="dot" aria-hidden="true"></span>
        </a>

        <form class="search" role="search" data-search-form>
          <span class="search-icon" data-icon="search" data-size="20"></span>
          <input type="search" name="q" placeholder="@@t.nav.search" aria-label="@@t.nav.search" data-city-search />
        </form>

        <div class="actions">
          <div class="city-select" data-city-select>
            <button class="city" type="button" data-city-toggle aria-haspopup="listbox" aria-expanded="false" aria-label="@@t.nav.chooseCity">
              <span data-icon="pin" data-size="18"></span><span data-city-name>@@t.city.lviv</span><span class="chev" data-icon="chevDown" data-size="16"></span>
            </button>
            <div class="menu" data-city-menu role="listbox" hidden></div>
          </div>
          <a class="icon-btn" href="@@langBase/map.html" aria-label="@@t.nav.map">
            <span data-icon="map" data-size="20"></span>
          </a>
          <button class="btn btn-soft btn-lang" type="button" data-lang-toggle aria-label="@@t.nav.langSwitch">@@t.lang.switch</button>
          <button class="icon-btn" type="button" data-theme-toggle aria-label="@@t.nav.theme"></button>
          <button class="btn btn-soft" type="button" data-login data-auth="out">@@t.auth.login</button>
          <button class="btn btn-accent" type="button" data-register data-auth="out">@@t.auth.register</button>
          <a class="btn btn-accent" data-create-event data-auth-organizer href="#" hidden>@@t.auth.createEvent</a>
          <a class="avatar avatar-user" href="@@langBase/profile.html" data-auth="in" data-auth-avatar hidden aria-label="@@t.nav.profile"></a>
          <button class="btn btn-soft" type="button" data-logout data-auth="in" hidden>@@t.auth.logout</button>
        </div>
      </div>
    </header>

    <!-- mobile header -->
    <div class="mobile-header">
      <div class="top">
        <a class="logo" href="@@langBase/" aria-label="@@t.brand.home">
          <span class="text">Shodumo</span><span class="dot" aria-hidden="true"></span>
        </a>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="city-select" data-city-select>
            <button class="city" type="button" data-city-toggle aria-haspopup="listbox" aria-expanded="false" aria-label="@@t.nav.chooseCity">
              <span data-icon="pin" data-size="16"></span><span data-city-name>@@t.city.lviv</span><span class="chev" data-icon="chevDown" data-size="14"></span>
            </button>
            <div class="menu right" data-city-menu role="listbox" hidden></div>
          </div>
          <button class="btn btn-soft btn-lang" type="button" data-lang-toggle aria-label="@@t.nav.langSwitch" style="padding:0 10px;height:38px">@@t.lang.switch</button>
          <button class="icon-btn" type="button" data-theme-toggle aria-label="@@t.nav.theme" style="width:38px;height:38px"></button>
        </div>
      </div>
      <form class="search" role="search" data-search-form>
        <span class="search-icon" data-icon="search" data-size="20"></span>
        <input type="search" name="q" placeholder="@@t.nav.search" aria-label="@@t.nav.search" data-city-search />
      </form>
    </div>
