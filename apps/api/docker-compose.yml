services:
  postgres:
    image: postgres:16-alpine
    container_name: shodumo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shodumo
      POSTGRES_PASSWORD: shodumo
      POSTGRES_DB: shodumo
    ports:
      - '5432:5432'
    volumes:
      - shodumo-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shodumo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shodumo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - shodumo-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  shodumo-pg:
  shodumo-redis:
