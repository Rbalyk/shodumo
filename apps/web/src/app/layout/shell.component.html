<div class="shell cab-scope">
  <aside class="side">
    <div class="brand">
      <span class="word">Shodumo</span><span class="dot"></span>
    </div>
    <div class="role">{{ (isAdmin() ? 'app.admin' : 'app.cabinet') | t }}</div>

    <nav class="nav">
      @for (item of navItems(); track item.path) {
        <a class="link" [routerLink]="item.path" routerLinkActive="is-active">
          {{ item.labelKey | t }}
        </a>
      }
    </nav>
  </aside>

  <div class="body">
    <header class="top">
      <span class="user muted">{{ auth.profile()?.email }}</span>
      <button class="btn btn-soft btn-sm" type="button" (click)="logout()">{{ 'app.signOut' | t }}</button>
    </header>

    <main class="main">
      <router-outlet />
    </main>
  </div>

  <app-confirm-dialog />
</div>
